{% extends 'base.html' %}

{% block content %}

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  :root {
     --bg: #437f4b;
    --surface: #fafaf8;
    --surface2: #e8e8e4;
    --border: rgba(0,0,0,0.08);
    --accent: #5a5f6e;
    --accent-soft: rgba(90,95,110,0.10);
    --accent-border: rgba(90,95,110,0.22);
    --text: #1e2030;
    --muted: #8a8f9e;
  }

  .pg-wrap {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    padding: 36px 32px 60px;
    color: var(--text);
    box-sizing: border-box;
  }

  /* ── Header ── */
  .pg-header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 36px;
  }

  .pg-title {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    margin: 0;
    color: #fff;
  }

  .pg-title span { color: var(--blue); }

  /* ── Botão Ver Todos ── */
  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--blue);
    background: rgba(79,142,247,0.10);
    border: 1px solid rgba(79,142,247,0.28);
    padding: 9px 20px;
    border-radius: 20px;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
  }

  .btn-primary:hover {
    background: rgba(79,142,247,0.20);
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(79,142,247,0.18);
  }

  /* ── Card do formulário ── */
  .form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px 28px;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.5s 0.1s ease both;
    max-width: 560px;
  }

  .form-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--blue);
    border-radius: 16px 16px 0 0;
  }

  .form-card-title {
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: #fff;
    margin: 0 0 24px;
  }

  /* ── Campos ── */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 24px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .form-group.full { grid-column: 1 / -1; }

  .form-label {
    font-size: 0.72rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.9px;
    color: var(--muted);
  }

  .form-input {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--text);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    width: 100%;
    box-sizing: border-box;
  }

  .form-input::placeholder { color: var(--muted); opacity: 0.6; }

  .form-input:focus {
    border-color: rgba(79,142,247,0.5);
    box-shadow: 0 0 0 3px rgba(79,142,247,0.08);
  }

  /* ── Botão Salvar ── */
  .btn-save {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 600;
    color: #fff;
    background: var(--blue);
    border: none;
    padding: 12px 32px;
    border-radius: 10px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
    width: 100%;
  }

  .btn-save:hover {
    opacity: 0.88;
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(79,142,247,0.35);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    .pg-wrap { padding: 20px 16px 40px; }
    .pg-header { flex-direction: column; align-items: flex-start; gap: 12px; }
    .pg-title { font-size: 1.5rem; }
    .form-grid { grid-template-columns: 1fr; }
  }
</style>

<div class="pg-wrap">

  <div class="pg-header">
    <h2 class="pg-title">👤 <span>Clientes</span></h2>
    <a class="btn-primary" href="/clientes_lista">📋 Ver Todos Clientes</a>
  </div>

  <div class="form-card">
    <h3 class="form-card-title">➕ Novo Cliente</h3>

    <form action="/add_cliente" method="POST">
      <div class="form-grid">

        <div class="form-group full">
          <label class="form-label" for="nome">Nome</label>
          <input class="form-input" type="text" id="nome" name="nome" placeholder="Nome completo" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="telefone">Telefone</label>
          <input class="form-input" type="text" id="telefone" name="telefone" placeholder="(00) 00000-0000" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="cpf">CPF</label>
          <input class="form-input" type="text" id="cpf" name="cpf" placeholder="000.000.000-00" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="cep">CEP</label>
          <input class="form-input" type="text" id="cep" name="cep" placeholder="00000-000" required>
        </div>

      </div>

      <button class="btn-save" type="submit">Salvar Cliente</button>
    </form>
  </div>

</div>

{% endblock %}
