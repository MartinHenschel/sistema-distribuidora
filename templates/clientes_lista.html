{% extends 'base.html' %}

{% block content %}

<h2>👤 Lista de Clientes</h2>

<form method="GET" action="/clientes_lista">
    <input type="text" name="busca" placeholder="Buscar cliente..." value="{{ busca }}">
    <button type="submit">Buscar</button>
    
    <a href="/clientes_lista">
        <button type="button">Limpar</button>
    </a>
</form>

<br>

{% if clientes|length == 0 %}
    <p>Nenhum cliente encontrado.</p>
{% endif %}

<table border="1" width="100%">
<tr>
    <th>Nome</th>
    <th>Telefone</th>
    <th>CPF</th>
    <th>CEP</th>
    <th>Data Cadastro</th>
</tr>

{% for c in clientes %}
<tr>
    <td>{{ c[1] }}</td>
    <td>{{ c[2] }}</td>
    <td>{{ c[3] }}</td>
    <td>{{ c[4] }}</td>
    <td>{{ c[5] }}</td>
</tr>
{% endfor %}

</table>

{% endblock %}
