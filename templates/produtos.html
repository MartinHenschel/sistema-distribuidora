{% extends 'base.html' %}

{% block content %}

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg:  #437f4b;
    --surface: #fafaf8e6;
    --surface2: #e8e8e4;
    --border: rgba(0,0,0,0.08);
    --accent: #fbfbfb;
    --accent-soft: rgba(90,95,110,0.10);
    --accent-border: rgba(90,95,110,0.22);
    --text: #1e2030;
    --muted: #8a8f9e;
  }

  .pg-wrap {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    padding: 36px 32px 60px;
    color: var(--text);
    box-sizing: border-box;
  }

  /* ── Header ── */
  .pg-header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 36px;
  }

  .pg-title {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    margin: 0;
    color: #fff;
  }

  .pg-title span { color: var(--accent); }

  /* ── Card formulário ── */
  .form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px 28px;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.5s 0.1s ease both;
    max-width: 560px;
    margin-bottom: 20px;
  }

  .form-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--accent);
    border-radius: 16px 16px 0 0;
  }

  .form-card-title {
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: #fff;
    margin: 0 0 24px;
  }

  /* ── Campos ── */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 24px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .form-group.full { grid-column: 1 / -1; }

  .form-label {
    font-size: 0.72rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.9px;
    color: var(--muted);
  }

  .form-input {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--text);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    width: 100%;
    box-sizing: border-box;
  }

  .form-input::placeholder { color: var(--muted); opacity: 0.6; }

  .form-input:focus {
    border-color: rgba(160,168,192,0.45);
    box-shadow: 0 0 0 3px rgba(160,168,192,0.07);
  }

  /* ── Botões ── */
  .btn-save {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 600;
    color: #0f1117;
    background: var(--accent);
    border: none;
    padding: 12px 32px;
    border-radius: 10px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
    width: 100%;
  }

  .btn-save:hover {
    opacity: 0.88;
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(160,168,192,0.2);
  }

  .btn-secondary {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--accent);
    background: var(--accent-soft);
    border: 1px solid var(--accent-border);
    padding: 10px 22px;
    border-radius: 10px;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.2s, transform 0.15s;
    animation: fadeUp 0.5s 0.2s ease both;
  }

  .btn-secondary:hover {
    background: rgba(160,168,192,0.2);
    transform: translateY(-2px);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    .pg-wrap { padding: 20px 16px 40px; }
    .pg-header { flex-direction: column; align-items: flex-start; gap: 10px; }
    .pg-title { font-size: 1.5rem; }
    .form-grid { grid-template-columns: 1fr; }
  }
</style>

<div class="pg-wrap">

  <div class="pg-header">
    <h2 class="pg-title">📦 <span>Produtos</span></h2>
  </div>

  <div class="form-card">
    <h3 class="form-card-title">➕ Novo Produto</h3>

    <form action="/add_produto" method="POST">
      <div class="form-grid">

        <div class="form-group full">
          <label class="form-label" for="nome">Nome do Produto</label>
          <input class="form-input" type="text" id="nome" name="nome" placeholder="Ex: Camiseta Preta M" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="preco">Preço (R$)</label>
          <input class="form-input" type="number" id="preco" name="preco" step="0.01" placeholder="0,00" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="quantidade">Quantidade</label>
          <input class="form-input" type="number" id="quantidade" name="quantidade" placeholder="0" required>
        </div>

      </div>

      <button class="btn-save" type="submit">Salvar Produto</button>
    </form>
  </div>

  <a class="btn-secondary" href="/estoque">📦 Ver Estoque Completo</a>

</div>

{% endblock %}
